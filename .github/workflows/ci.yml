name: Build HTML [using jupyter-book]
on: [pull_request]
jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Anaconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          auto-update-conda: true
          auto-activate-base: true
          miniconda-version: 'latest'
          python-version: "3.13"
          environment-file: environment.yml
          activate-environment: quantecon
      - name: Graphics Support #TODO: Review if graphviz is needed
        run: |
          sudo apt-get -qq update && sudo apt-get install -y graphviz
      - name: Install latex dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get install -y     \
            texlive-latex-recommended \
            texlive-latex-extra       \
            texlive-fonts-recommended \
            texlive-fonts-extra       \
            texlive-xetex             \
            latexmk                   \
            xindy                     \
            dvipng                    \
            cm-super                  \
            latex-cjk-all
      - name: Display Conda Environment Versions
        shell: bash -l {0}
        run: conda list
      - name: Display Pip Versions
        shell: bash -l {0}
        run: pip list
      - name: Download "build" folder (cache)
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: cache.yml
          branch: main
          name: build-cache
          path: _build
      - name: Clear stale Sphinx environment
        shell: bash -l {0}
        run: rm -rf _build/.doctrees
      # # Build Assets (Download Notebooks and PDF via LaTeX)
      # - name: Build PDF from LaTeX
      #   shell: bash -l {0}
      #   run: |
      #     jb build lectures --builder pdflatex --path-output ./ -n --keep-going
      #     mkdir -p _build/html/_pdf
      #     cp -u _build/latex/*.pdf _build/html/_pdf
      # - name: Upload Execution Reports (LaTeX)
      #   uses: actions/upload-artifact@v7
      #   if: failure()
      #   with:
      #     name: execution-reports
      #     path: _build/latex/reports
      - name: Build Download Notebooks (sphinx-tojupyter)
        shell: bash -l {0}
        run: |
          # `shell: bash -l {0}` is a custom shell spec, so GitHub does not inject
          # `-eo pipefail` (it only does that for the bare `shell: bash` shorthand).
          # Without this, a failing `jb build` would be masked by the trailing
          # mkdir/cp, whose exit code becomes the step's — and `--keep-going`
          # guarantees the .ipynb files exist for `cp` to succeed on.
          set -eo pipefail
          jb build lectures -n -W --keep-going --path-output ./ --builder=custom --custom-builder=jupyter
          mkdir -p _build/html/_notebooks
          cp -u _build/jupyter/*.ipynb _build/html/_notebooks
      - name: Upload Execution Reports (Download Notebooks)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: execution-reports-notebooks
          path: _build/jupyter/reports
      # Build HTML (Website)
      - name: Build HTML
        shell: bash -l {0}
        run: |
          jb build lectures --path-output ./ -n -W --keep-going
      - name: Upload Execution Reports (HTML)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: execution-reports-html
          path: _build/html/reports
      - name: Preview Deploy to Netlify
        uses: nwtgck/actions-netlify@v4.0
        with:
          publish-dir: '_build/html/'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Preview Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
